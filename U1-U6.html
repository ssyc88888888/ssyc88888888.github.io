<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语填空练习 · 答案确认版</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --text: #1a202c;
            --sub: #4a5568;
            --accent: #3182ce;
            --accent-hover: #2b6cb0;
            --success: #38a169;
            --error: #e53e3e;
            --warning: #dd6b20;
            --warning-hover: #c05621;
            --confirm: #9b59b6;
            --confirm-hover: #7d3c98;
            --border: #e2e8f0;
            --input-bg: #edf2f7;
            --tag-bg: #ebf8ff;
            --tag-text: #2b6cb0;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
            --radius: 14px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px 28px 28px;
            width: 100%;
            max-width: 720px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .badge {
            background: var(--tag-bg);
            color: var(--tag-text);
            font-weight: 600;
            font-size: 0.85rem;
            padding: 5px 14px;
            border-radius: 20px;
            letter-spacing: 0.4px;
        }
        .counter {
            font-size: 0.9rem;
            color: var(--sub);
            font-weight: 500;
        }
        .counter span {
            font-weight: 700;
            color: var(--accent);
        }
        .chinese-box {
            background: #fffbeb;
            border-left: 4px solid #f6ad55;
            padding: 12px 16px;
            border-radius: 0 10px 10px 0;
            margin-bottom: 18px;
            font-size: 1.05rem;
            color: #744210;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .english-box {
            background: #f7fafc;
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 20px 18px;
            margin-bottom: 18px;
            text-align: center;
            font-size: 1.25rem;
            letter-spacing: 0.4px;
            word-spacing: 2px;
            transition: all 0.3s;
        }
        .english-box .blank {
            display: inline-block;
            min-width: 100px;
            border-bottom: 3px solid var(--accent);
            margin: 0 6px;
            padding: 2px 8px;
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            border-radius: 2px;
        }
        .english-box .blank.correct-highlight {
            color: var(--success);
            border-bottom-color: var(--success);
            background: #f0fff4;
        }
        .english-box .blank.wrong-highlight {
            color: var(--error);
            border-bottom-color: var(--error);
            background: #fff5f5;
        }
        .english-box .blank.confirm-highlight {
            color: #fff;
            background: var(--confirm);
            border-bottom-color: var(--confirm);
            padding: 2px 12px;
            border-radius: 6px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
            align-items: center;
        }
        .input-row input {
            flex: 1;
            min-width: 160px;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1.05rem;
            background: var(--input-bg);
            transition: all 0.25s;
            outline: none;
            letter-spacing: 0.3px;
        }
        .input-row input:focus {
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.1);
        }
        .input-row input.correct-input {
            border-color: var(--success);
            background: #f0fff4;
        }
        .input-row input.wrong-input {
            border-color: var(--error);
            background: #fff5f5;
        }
        .input-row input.confirm-input {
            border-color: var(--confirm);
            background: #faf5ff;
        }
        .input-row input:read-only {
            background: #f7fafc;
            cursor: default;
            color: #4a5568;
            border-color: #cbd5e0;
        }
        .btn {
            padding: 12px 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-check {
            background: var(--accent);
            color: #fff;
        }
        .btn-check:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(49, 130, 206, 0.3);
        }
        .btn-confirm {
            background: var(--confirm);
            color: #fff;
        }
        .btn-confirm:hover:not(:disabled) {
            background: var(--confirm-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(155, 89, 182, 0.4);
        }
        .btn-hint {
            background: #fff;
            color: var(--accent);
            border: 2px solid var(--accent);
        }
        .btn-hint:hover:not(:disabled) {
            background: #ebf8ff;
        }
        .btn-show {
            background: #fff;
            color: var(--warning);
            border: 2px solid var(--warning);
        }
        .btn-show:hover:not(:disabled) {
            background: #fffaf0;
            border-color: var(--warning-hover);
            color: var(--warning-hover);
            transform: translateY(-1px);
        }
        .result-area {
            display: none;
            padding: 16px 18px;
            border-radius: 12px;
            margin-bottom: 14px;
            animation: fadeIn 0.3s ease;
            font-weight: 500;
        }
        .result-area.show {
            display: block;
        }
        .result-area.correct {
            background: #f0fff4;
            border: 1px solid #c6f6d5;
            color: #276749;
        }
        .result-area.wrong {
            background: #fff5f5;
            border: 1px solid #fed7d7;
            color: #9b2c2c;
        }
        .result-area.retry {
            background: #fffaf0;
            border: 1px solid #feebc8;
            color: #7c4a1a;
        }
        .result-area.confirm-msg {
            background: #faf5ff;
            border: 1px solid #e9d8fd;
            color: #553c7b;
        }
        .result-area .icon {
            font-size: 1.3rem;
            margin-right: 6px;
        }
        .result-area .answer-reveal {
            font-weight: 700;
            letter-spacing: 0.4px;
            background: #fff;
            padding: 3px 10px;
            border-radius: 6px;
            margin: 0 3px;
        }
        .result-area .explanation {
            margin-top: 8px;
            font-size: 0.9rem;
            opacity: 0.9;
            line-height: 1.5;
        }
        .nav-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-nav {
            background: #fff;
            color: var(--text);
            border: 2px solid var(--border);
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .btn-nav:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: #f7fafc;
        }
        .btn-nav:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-random {
            background: #fefcbf;
            border-color: #f6e05e;
            color: #975a16;
        }
        .btn-random:hover {
            background: #fef3c7;
            border-color: #f0b429;
        }
        .jump-row {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .jump-row input {
            width: 70px;
            padding: 8px 10px;
            border-radius: 8px;
            border: 2px solid var(--border);
            text-align: center;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
        }
        .jump-row input:focus {
            border-color: var(--accent);
        }
        .jump-row .btn-jump {
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .jump-row .btn-jump:hover {
            background: var(--accent-hover);
        }
        .stats {
            text-align: center;
            margin-top: 12px;
            font-size: 0.85rem;
            color: var(--sub);
        }
        .stats span {
            font-weight: 700;
        }
        .stats .s-correct {
            color: var(--success);
        }
        .stats .s-wrong {
            color: var(--error);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 500px) {
            .container { padding: 18px 12px 16px; }
            .english-box { font-size: 1.05rem; padding: 14px 10px; }
            .english-box .blank { min-width: 50px; }
            .input-row input { font-size: 0.95rem; padding: 10px 12px; }
            .btn { padding: 10px 12px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="badge">📝 英语填空 · 答案确认</span>
            <span class="counter">第 <span id="currentNum">1</span> / <span id="totalNum">500</span> 题</span>
        </div>
        <div class="chinese-box" id="chineseText"></div>
        <div class="english-box" id="englishText"></div>
        <div class="input-row">
            <input type="text" id="userInput" placeholder="输入你的答案..." autocomplete="off">
            <button class="btn btn-check" id="btnCheck">✅ 检查</button>
            <button class="btn btn-hint" id="btnHint">💡 提示</button>
            <button class="btn btn-show" id="btnShowAnswer">👁 查看答案</button>
        </div>
        <div class="result-area" id="resultArea"></div>
        <div class="nav-row">
            <button class="btn-nav" id="btnPrev">⬅ 上一题</button>
            <button class="btn-nav btn-random" id="btnRandom">🎲 随机</button>
            <button class="btn-nav" id="btnNext">下一题 ➡</button>
        </div>
        <div class="jump-row">
            <span style="font-size:0.9rem;color:var(--sub);">跳转到第</span>
            <input type="number" id="jumpInput" min="1" max="500" value="1">
            <span style="font-size:0.9rem;color:var(--sub);">题</span>
            <button class="btn-jump" id="btnJump">GO</button>
        </div>
        <div class="stats">
            ✅ 正确：<span class="s-correct" id="correctCount">0</span> &nbsp;|&nbsp;
            ❌ 查看答案：<span class="s-wrong" id="wrongCount">0</span> &nbsp;|&nbsp;
            📊 自主正确率：<span id="rate">-</span>
        </div>
    </div>

    <script>
        (function() {
            // 题目数据 (与之前相同，此处省略重复代码，实际使用时需完整保留500题)
            const questions = [
                { en: "She always ______ try new things.", zh: "她总是鼓励我尝试新事物。", ans: ["encourages me to"], exp: "encourage sb. to do" },
                { en: "I ______ the dark when I was a child.", zh: "小时候我害怕黑暗。", ans: ["was afraid of", "feared"], exp: "be afraid of" },
                // ... 此处应包含完整的500道题，为简洁展示仅保留前2题结构，实际使用时请复制之前提供的完整数组
                { en: "It took him a long time to ______ the loss of his dog.", zh: "他花了很长时间才从失去爱犬的阴影中走出来。", ans: ["get over"], exp: "get over" }
            ];

            let currentIndex = 0;
            let correctCount = 0;
            let wrongCount = 0;
            const total = questions.length;
            let completedFlags = new Array(total).fill(false);       // 最终完成锁定
            let awaitingConfirmation = new Array(total).fill(false); // 已查看答案，等待正确输入确认
            let correctFlags = new Array(total).fill(false);         // 记录是否自主答对
            let attemptCount = new Array(total).fill(0);
            let hintUsed = false;

            const chineseText = document.getElementById('chineseText');
            const englishText = document.getElementById('englishText');
            const userInput = document.getElementById('userInput');
            const btnCheck = document.getElementById('btnCheck');
            const btnHint = document.getElementById('btnHint');
            const btnShowAnswer = document.getElementById('btnShowAnswer');
            const resultArea = document.getElementById('resultArea');
            const btnPrev = document.getElementById('btnPrev');
            const btnNext = document.getElementById('btnNext');
            const btnRandom = document.getElementById('btnRandom');
            const jumpInput = document.getElementById('jumpInput');
            const btnJump = document.getElementById('btnJump');
            const currentNum = document.getElementById('currentNum');
            const totalNum = document.getElementById('totalNum');
            const correctCountEl = document.getElementById('correctCount');
            const wrongCountEl = document.getElementById('wrongCount');
            const rateEl = document.getElementById('rate');

            totalNum.textContent = total;

            function renderQuestion() {
                const q = questions[currentIndex];
                chineseText.textContent = q.zh;
                let enHTML = q.en.replace(/______/g, '<span class="blank" id="blankSlot">______</span>');
                englishText.innerHTML = enHTML;
                const blankSlot = document.getElementById('blankSlot');
                hintUsed = false;
                btnHint.textContent = '💡 提示';

                if (completedFlags[currentIndex]) {
                    // 已完成锁定
                    userInput.value = q.ans[0];
                    userInput.readOnly = true;
                    userInput.className = correctFlags[currentIndex] ? 'correct-input' : 'wrong-input';
                    btnCheck.disabled = true;
                    btnShowAnswer.disabled = true;
                    btnHint.disabled = true;
                    btnCheck.textContent = '✅ 检查';
                    btnCheck.classList.remove('btn-confirm');
                    if (blankSlot) {
                        blankSlot.textContent = q.ans[0];
                        blankSlot.className = correctFlags[currentIndex] ? 'blank correct-highlight' : 'blank wrong-highlight';
                    }
                    resultArea.className = 'result-area show ' + (correctFlags[currentIndex] ? 'correct' : 'wrong');
                    resultArea.innerHTML = (correctFlags[currentIndex] ? 
                        '<span class="icon">✅</span> 正确！' : 
                        '<span class="icon">👁</span> 已查看答案并确认') +
                        '<div class="explanation">📖 ' + q.exp + '</div>';
                } else if (awaitingConfirmation[currentIndex]) {
                    // 已查看答案，等待输入正确值
                    userInput.value = '';
                    userInput.readOnly = false;
                    userInput.className = 'confirm-input';
                    btnCheck.disabled = false;
                    btnShowAnswer.disabled = true;
                    btnHint.disabled = true;
                    btnCheck.textContent = '✅ 确认输入';
                    btnCheck.classList.add('btn-confirm');
                    if (blankSlot) {
                        blankSlot.textContent = q.ans[0];
                        blankSlot.className = 'blank confirm-highlight';
                    }
                    resultArea.className = 'result-area show confirm-msg';
                    resultArea.innerHTML = '<span class="icon">📋</span> 请准确输入上方的答案以完成本题。';
                } else {
                    // 正常答题
                    userInput.value = '';
                    userInput.readOnly = false;
                    userInput.className = '';
                    btnCheck.disabled = false;
                    btnShowAnswer.disabled = false;
                    btnHint.disabled = false;
                    btnCheck.textContent = '✅ 检查';
                    btnCheck.classList.remove('btn-confirm');
                    if (blankSlot) {
                        blankSlot.textContent = '______';
                        blankSlot.className = 'blank';
                    }
                    resultArea.className = 'result-area';
                    resultArea.innerHTML = '';
                }
                updateNavButtons();
                updateStats();
                jumpInput.value = currentIndex + 1;
                if (!completedFlags[currentIndex] || awaitingConfirmation[currentIndex]) {
                    userInput.focus();
                }
            }

            function updateNavButtons() {
                btnPrev.disabled = currentIndex === 0;
                btnNext.disabled = currentIndex === total - 1;
                currentNum.textContent = currentIndex + 1;
            }

            function updateStats() {
                correctCountEl.textContent = correctCount;
                wrongCountEl.textContent = wrongCount;
                const totalAnswered = correctCount + wrongCount;
                rateEl.textContent = totalAnswered > 0 ? Math.round((correctCount / totalAnswered) * 100) + '%' : '-';
            }

            function checkAnswer() {
                if (completedFlags[currentIndex]) return;
                const q = questions[currentIndex];
                const userAnswer = userInput.value.trim();
                if (!userAnswer) {
                    resultArea.className = 'result-area show retry';
                    resultArea.innerHTML = '<span class="icon">⚠️</span> 请输入答案。';
                    return;
                }
                if (awaitingConfirmation[currentIndex]) {
                    // 确认模式：必须完全匹配正确答案
                    const match = q.ans.some(a => userAnswer.toLowerCase() === a.toLowerCase());
                    if (match) {
                        completedFlags[currentIndex] = true;
                        awaitingConfirmation[currentIndex] = false;
                        userInput.readOnly = true;
                        userInput.className = 'correct-input';
                        btnCheck.disabled = true;
                        btnShowAnswer.disabled = true;
                        btnHint.disabled = true;
                        btnCheck.textContent = '✅ 检查';
                        btnCheck.classList.remove('btn-confirm');
                        const blankSlot = document.getElementById('blankSlot');
                        if (blankSlot) {
                            blankSlot.className = 'blank correct-highlight';
                        }
                        resultArea.className = 'result-area show correct';
                        resultArea.innerHTML = '<span class="icon">✅</span> 已确认！答案：<span class="answer-reveal">' + q.ans[0] + '</span><div class="explanation">📖 ' + q.exp + '</div>';
                        updateStats();
                    } else {
                        userInput.value = '';
                        userInput.className = 'wrong-input';
                        resultArea.className = 'result-area show retry';
                        resultArea.innerHTML = '<span class="icon">❌</span> 输入与答案不一致，请仔细核对后重新输入。';
                        setTimeout(() => userInput.classList.remove('wrong-input'), 600);
                    }
                    return;
                }

                // 正常答题模式
                const isCorrect = q.ans.some(a => userAnswer.toLowerCase() === a.toLowerCase());
                if (isCorrect) {
                    correctCount++;
                    completedFlags[currentIndex] = true;
                    correctFlags[currentIndex] = true;
                    attemptCount[currentIndex] = 0;
                    userInput.readOnly = true;
                    userInput.className = 'correct-input';
                    btnCheck.disabled = true;
                    btnShowAnswer.disabled = true;
                    btnHint.disabled = true;
                    const blankSlot = document.getElementById('blankSlot');
                    if (blankSlot) {
                        blankSlot.textContent = q.ans[0];
                        blankSlot.className = 'blank correct-highlight';
                    }
                    resultArea.className = 'result-area show correct';
                    resultArea.innerHTML = '<span class="icon">✅</span> 正确！答案：<span class="answer-reveal">' + q.ans[0] + '</span><div class="explanation">📖 ' + q.exp + '</div>';
                    updateStats();
                } else {
                    attemptCount[currentIndex]++;
                    const attempts = attemptCount[currentIndex];
                    userInput.value = '';
                    userInput.className = 'wrong-input';
                    resultArea.className = 'result-area show retry';
                    let hintMsg = '';
                    if (attempts === 1) {
                        hintMsg = '<span class="icon">❌</span> 不对哦，请再试一次！可点击 💡提示 或 👁查看答案。';
                    } else if (attempts === 2) {
                        hintMsg = '<span class="icon">❌</span> 还是不对。💡 提示：答案首字母是 <strong>"' + q.ans[0].charAt(0).toUpperCase() + '"</strong>。';
                    } else {
                        hintMsg = '<span class="icon">❌</span> 还是不对。答案首字母 <strong>"' + q.ans[0].charAt(0).toUpperCase() + '"</strong>，共 <strong>' + q.ans[0].split(' ').length + '</strong> 个单词。试试或查看答案吧。';
                    }
                    resultArea.innerHTML = hintMsg;
                    setTimeout(() => { if (!completedFlags[currentIndex] && !awaitingConfirmation[currentIndex]) userInput.classList.remove('wrong-input'); }, 600);
                }
            }

            function showAnswer() {
                if (completedFlags[currentIndex] || awaitingConfirmation[currentIndex]) return;
                const q = questions[currentIndex];
                wrongCount++;
                awaitingConfirmation[currentIndex] = true;
                attemptCount[currentIndex] = 0;
                hintUsed = true;
                btnHint.textContent = '🔍 更多提示';
                renderQuestion();
                updateStats();
            }

            function showHint() {
                if (completedFlags[currentIndex] || awaitingConfirmation[currentIndex]) return;
                const q = questions[currentIndex];
                if (hintUsed) {
                    resultArea.className = 'result-area show retry';
                    resultArea.innerHTML = '<span class="icon">💡</span> 提示已用过。答案首字母：<strong>' + q.ans[0].charAt(0).toUpperCase() + '</strong>，共 <strong>' + q.ans[0].split(' ').length + '</strong> 个单词。';
                } else {
                    hintUsed = true;
                    btnHint.textContent = '🔍 更多提示';
                    resultArea.className = 'result-area show correct';
                    resultArea.innerHTML = '<span class="icon">💡</span> 答案首字母为 <strong>' + q.ans[0].charAt(0).toUpperCase() + '</strong>，共约 <strong>' + q.ans[0].split(' ').length + '</strong> 个单词。';
                }
                resultArea.classList.add('show');
            }

            function goToPrev() { if (currentIndex > 0) { currentIndex--; renderQuestion(); } }
            function goToNext() { if (currentIndex < total - 1) { currentIndex++; renderQuestion(); } }
            function goToRandom() {
                let newIndex; do { newIndex = Math.floor(Math.random() * total); } while (newIndex === currentIndex && total > 1);
                currentIndex = newIndex; renderQuestion();
            }
            function jumpTo() {
                let target = parseInt(jumpInput.value, 10);
                if (isNaN(target) || target < 1) target = 1;
                if (target > total) target = total;
                currentIndex = target - 1; renderQuestion();
            }

            btnCheck.addEventListener('click', checkAnswer);
            btnShowAnswer.addEventListener('click', showAnswer);
            btnHint.addEventListener('click', showHint);
            btnPrev.addEventListener('click', goToPrev);
            btnNext.addEventListener('click', goToNext);
            btnRandom.addEventListener('click', goToRandom);
            btnJump.addEventListener('click', jumpTo);
            userInput.addEventListener('keydown', e => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (completedFlags[currentIndex]) goToNext();
                    else checkAnswer();
                }
            });
            jumpInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); jumpTo(); } });
            document.addEventListener('keydown', e => {
                if (e.key === 'ArrowLeft' && document.activeElement !== userInput && document.activeElement !== jumpInput) { e.preventDefault(); goToPrev(); }
                if (e.key === 'ArrowRight' && document.activeElement !== userInput && document.activeElement !== jumpInput) { e.preventDefault(); goToNext(); }
                if (e.key === 'r' && e.ctrlKey && document.activeElement !== userInput && document.activeElement !== jumpInput) { e.preventDefault(); goToRandom(); }
                if (e.key === 's' && e.ctrlKey && !completedFlags[currentIndex] && !awaitingConfirmation[currentIndex] && document.activeElement !== userInput && document.activeElement !== jumpInput) { e.preventDefault(); showAnswer(); }
            });

            renderQuestion();
            userInput.focus();
            console.log('📋 答案确认模式已启动。点击“查看答案”后需正确输入一次才能完成。');
        })();
    </script>
</body>
</html>
